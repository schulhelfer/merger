<!doctype html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b1220">
  <meta name="color-scheme" content="light dark">
  <title>Merger</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="32x32" href="./icon-32x32.png">
  <link rel="apple-touch-icon" sizes="192x192" href="./icon-192x192.png">
  <style>
    :root {
      --bg-top: #f6f8ff;
      --bg-bottom: #e4edf8;
      --glass: rgba(255, 255, 255, .56);
      --glass-strong: rgba(255, 255, 255, .72);
      --text: #111827;
      --muted: #5b6474;
      --line: rgba(255, 255, 255, .6);
      --accent: #0a84ff;
      --accent-soft: rgba(10, 132, 255, .16);
      --drop: rgba(255, 255, 255, .46);
      --ok: #0f7a2a;
      --warn: #9a6c00;
      --error: #b42318;
      --shadow: 0 18px 48px rgba(14, 29, 58, .16);
      --inner: inset 0 1px 0 rgba(255,255,255,.65);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-top: #131722;
        --bg-bottom: #0b0f18;
        --glass: rgba(22, 28, 42, .62);
        --glass-strong: rgba(27, 35, 52, .76);
        --text: #e7edf7;
        --muted: #a8b5cb;
        --line: rgba(205, 219, 246, .18);
        --accent: #5fb0ff;
        --accent-soft: rgba(95, 176, 255, .18);
        --drop: rgba(18, 23, 35, .72);
        --ok: #75d795;
        --warn: #ffcf69;
        --error: #ff9f97;
        --shadow: 0 20px 54px rgba(0,0,0,.45);
        --inner: inset 0 1px 0 rgba(255,255,255,.06);
      }
    }
    html[data-theme="light"] {
      --bg-top: #f6f8ff;
      --bg-bottom: #e4edf8;
      --glass: rgba(255, 255, 255, .9);
      --glass-strong: rgba(255, 255, 255, .96);
      --text: #111827;
      --muted: #5b6474;
      --line: rgba(32, 54, 94, .24);
      --accent: #0a84ff;
      --accent-soft: rgba(10, 132, 255, .16);
      --drop: rgba(255, 255, 255, .92);
      --ok: #0f7a2a;
      --warn: #9a6c00;
      --error: #b42318;
      --shadow: 0 18px 42px rgba(14, 29, 58, .22);
      --inner: inset 0 1px 0 rgba(255,255,255,.9);
    }
    html[data-theme="dark"] {
      --bg-top: #131722;
      --bg-bottom: #0b0f18;
      --glass: rgba(22, 28, 42, .62);
      --glass-strong: rgba(27, 35, 52, .76);
      --text: #e7edf7;
      --muted: #a8b5cb;
      --line: rgba(205, 219, 246, .18);
      --accent: #5fb0ff;
      --accent-soft: rgba(95, 176, 255, .18);
      --drop: rgba(18, 23, 35, .72);
      --ok: #75d795;
      --warn: #ffcf69;
      --error: #ff9f97;
      --shadow: 0 20px 54px rgba(0,0,0,.45);
      --inner: inset 0 1px 0 rgba(255,255,255,.06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 16px/1.45 "SF Pro Text", "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(1100px 700px at 12% -10%, rgba(110, 190, 255, .35), transparent 55%),
        radial-gradient(900px 520px at 90% 0%, rgba(255, 145, 186, .24), transparent 58%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      color: var(--text);
      min-height: 100svh;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(255,255,255,.22) 0%, transparent 45%);
      z-index: 0;
    }
    .app {
      width: min(1380px, 100%);
      margin: 0 auto;
      padding: clamp(14px, 2.6vw, 28px);
      position: relative;
      z-index: 1;
      transition: filter .2s ease;
    }
    .cards-layout {
      display: grid;
      gap: 18px;
      align-items: start;
      margin-top: 18px;
    }
    @media (min-width: 1100px) {
      .cards-layout {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    .cards-layout .card-head {
      margin-bottom: 0;
    }
    .cards-layout .card-head + .grid,
    .cards-layout .card-head + .field {
      margin-top: 18px;
    }
    body.dialog-active .app {
      filter: blur(6px) saturate(.92);
      pointer-events: none;
      user-select: none;
    }
    .card {
      background: linear-gradient(145deg, var(--glass-strong), var(--glass));
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow), var(--inner);
      backdrop-filter: blur(24px) saturate(165%);
      -webkit-backdrop-filter: blur(24px) saturate(165%);
      padding: clamp(16px, 2.2vw, 26px);
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    .settings-trigger {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--glass) 88%, transparent);
      box-shadow: var(--inner);
      color: inherit;
      font: inherit;
      font-size: 1.15rem;
      line-height: 1;
      display: grid;
      place-items: center;
      cursor: pointer;
      flex: 0 0 auto;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.45rem, 2vw + 1rem, 2.1rem);
      line-height: 1.1;
      letter-spacing: -.01em;
    }
    p {
      margin: 0 0 14px;
      color: var(--muted);
    }
    .drop {
      border: 1.5px dashed color-mix(in srgb, var(--accent) 28%, var(--line));
      border-radius: 18px;
      min-height: 220px;
      display: grid;
      place-items: center;
      padding: 20px;
      text-align: center;
      background: linear-gradient(180deg, color-mix(in srgb, var(--drop) 80%, transparent), var(--drop));
      box-shadow: var(--inner);
      cursor: pointer;
      user-select: none;
      transition: border-color .2s ease, background .2s ease, transform .2s ease, box-shadow .2s ease;
    }
    .drop.awaiting-file {
      border-color: color-mix(in srgb, var(--accent) 42%, var(--line));
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 10%, transparent), 0 8px 18px color-mix(in srgb, var(--accent) 12%, transparent), var(--inner);
    }
    .drop.dragover {
      border-color: color-mix(in srgb, var(--accent) 70%, var(--line));
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent-soft) 55%, var(--drop)), var(--drop));
      box-shadow: 0 10px 28px color-mix(in srgb, var(--accent) 18%, transparent), var(--inner);
      transform: translateY(-1px) scale(1.005);
    }
    .drop strong {
      display: block;
      font-size: 1.2rem;
      margin-bottom: 6px;
    }
    .filename {
      margin-top: 8px;
      font-weight: 700;
      color: var(--text);
      word-break: break-word;
    }
    .drop-content {
      width: 100%;
      max-width: 640px;
    }
    .file-list {
      margin-top: 10px;
      display: grid;
      gap: 8px;
      text-align: left;
    }
    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid color-mix(in srgb, var(--line) 88%, transparent);
      border-radius: 12px;
      padding: 8px 10px;
      background: color-mix(in srgb, var(--glass) 84%, transparent);
      box-shadow: var(--inner);
      cursor: grab;
      transition: border-color .15s ease, opacity .15s ease;
    }
    .file-item.dragging {
      opacity: .48;
      cursor: grabbing;
    }
    .file-item.drop-before {
      border-top: 3px solid color-mix(in srgb, var(--accent) 80%, var(--line));
      padding-top: 6px;
    }
    .file-item.drop-after {
      border-bottom: 3px solid color-mix(in srgb, var(--accent) 80%, var(--line));
      padding-bottom: 6px;
    }
    .file-drag {
      color: var(--muted);
      font-weight: 700;
      line-height: 1;
      letter-spacing: .02em;
      user-select: none;
      flex: 0 0 auto;
    }
    .file-item-name {
      min-width: 0;
      flex: 1 1 auto;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-delete {
      width: 30px;
      height: 30px;
      border: 1px solid color-mix(in srgb, var(--line) 85%, var(--error));
      border-radius: 9px;
      background: color-mix(in srgb, var(--glass) 80%, transparent);
      box-shadow: var(--inner);
      color: var(--error);
      font-size: 1rem;
      line-height: 1;
      display: grid;
      place-items: center;
      cursor: pointer;
      flex: 0 0 auto;
      transition: transform .16s ease, background .16s ease;
    }
    .file-delete:hover {
      transform: translateY(-1px);
      background: color-mix(in srgb, var(--error) 12%, var(--glass));
    }
    .card-title {
      margin: 0;
      font-size: clamp(1.24rem, 1.5vw + .86rem, 1.65rem);
      line-height: 1.15;
      letter-spacing: -.01em;
    }
    .card-subtitle {
      margin: 2px 0 14px;
      color: var(--muted);
      font-size: .94rem;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 18px;
    }
    @media (min-width: 720px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }
      .grid > .field:only-child {
        grid-column: 1 / -1;
      }
    }
    .field {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      min-height: 100%;
      background: color-mix(in srgb, var(--glass) 85%, transparent);
      box-shadow: var(--inner);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .field.options-disabled {
      opacity: .52;
    }
    .field.options-disabled .pages button,
    .field.options-disabled input,
    .field.options-disabled .padding-choice label {
      cursor: not-allowed;
    }
    .pages button:disabled {
      opacity: .7;
      transform: none;
    }
    .pages button:disabled:hover {
      transform: none;
    }
    input[type="number"]:disabled,
    input[type="radio"]:disabled {
      opacity: .7;
    }
    .section-title {
      margin: 0 0 10px;
      font-size: 1rem;
      font-weight: 700;
      display: block;
      color: inherit;
    }
    .setting-group {
      margin-top: 18px;
    }
    .pages {
      display: grid;
      grid-template-columns: repeat(auto-fit, 112px);
      justify-content: center;
      gap: 10px;
    }
    .pages button {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: color-mix(in srgb, var(--glass) 85%, transparent);
      box-shadow: var(--inner);
      color: inherit;
      width: 112px;
      padding: 14px;
      cursor: pointer;
      transition: border-color .2s ease, background .2s ease, transform .2s ease, box-shadow .2s ease;
      font: inherit;
      overflow: hidden;
      display: grid;
      place-items: center;
    }
    .page-option {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
    }
    .pages button.active {
      border: 1px solid color-mix(in srgb, var(--accent) 70%, var(--line));
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent-soft) 88%, transparent), color-mix(in srgb, var(--glass) 92%, transparent));
      font-weight: 700;
      box-shadow: 0 8px 20px color-mix(in srgb, var(--accent) 18%, transparent), var(--inner);
    }
    .pages button:hover {
      transform: translateY(-1px);
    }
    .mini-sheet {
      width: 84px;
      height: 84px;
      margin: 0;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2px;
      padding: 4px;
      border: 1.6px solid color-mix(in srgb, var(--line) 82%, transparent);
      border-radius: 8px;
      background: color-mix(in srgb, var(--glass) 75%, transparent);
      overflow: hidden;
    }
    .mini-sheet span {
      display: grid;
      place-items: center;
      border: 1.6px solid color-mix(in srgb, var(--line) 72%, transparent);
      font-size: .92rem;
      line-height: 1;
      color: var(--accent);
      font-weight: 700;
      background: color-mix(in srgb, var(--accent-soft) 22%, var(--glass));
      min-height: 0;
    }
    .stack-2 .mini-sheet { grid-template-rows: repeat(1, 1fr); }
    .stack-4 .mini-sheet { grid-template-rows: repeat(2, 1fr); }
    .stack-6 .mini-sheet { grid-template-rows: repeat(3, 1fr); }
    .stack-8 .mini-sheet { grid-template-rows: repeat(4, 1fr); }
    .pages button.special-toggle {
      padding: 14px 12px;
    }
    .pages button.special-toggle[aria-pressed="true"] {
      border-color: color-mix(in srgb, var(--accent) 70%, var(--line));
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent-soft) 88%, transparent), color-mix(in srgb, var(--glass) 92%, transparent));
      box-shadow: 0 8px 20px color-mix(in srgb, var(--accent) 18%, transparent), var(--inner);
    }
    .special-icon {
      width: 84px;
      height: 84px;
      display: grid;
      align-content: center;
      gap: 6px;
    }
    .special-sheet {
      border: 1.6px solid color-mix(in srgb, var(--line) 82%, transparent);
      border-radius: 6px;
      background: color-mix(in srgb, var(--glass) 75%, transparent);
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2px;
      padding: 3px;
      min-height: 24px;
    }
    .special-sheet span {
      display: grid;
      place-items: center;
      border: 1.6px solid color-mix(in srgb, var(--line) 72%, transparent);
      font-size: .92rem;
      line-height: 1;
      color: var(--accent);
      font-weight: 700;
      background: color-mix(in srgb, var(--accent-soft) 22%, var(--glass));
      min-height: 0;
    }
    label {
      display: block;
      font-size: .95rem;
      margin-bottom: 8px;
      font-weight: 600;
    }
    input[type="number"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      background: color-mix(in srgb, var(--glass) 78%, transparent);
      box-shadow: var(--inner);
      color: inherit;
      font: inherit;
    }
    #studentCount {
      width: 8ch;
      min-width: 8ch;
      max-width: 100%;
    }
    input[type="radio"] {
      appearance: none;
      -webkit-appearance: none;
      width: 1.02rem;
      height: 1.02rem;
      border-radius: 50%;
      border: 2px solid color-mix(in srgb, var(--line) 85%, var(--text));
      background: transparent;
      display: inline-grid;
      place-content: center;
      margin: 0;
      flex: 0 0 auto;
    }
    input[type="radio"]::before {
      content: "";
      width: .5rem;
      height: .5rem;
      border-radius: 50%;
      background: var(--accent);
      transform: scale(0);
      transition: transform .14s ease;
    }
    input[type="radio"]:checked::before {
      transform: scale(1);
    }
    .padding-choice {
      margin-top: 12px;
      display: grid;
      gap: 8px;
      color: inherit;
    }
    .padding-choice label {
      margin: 0;
      display: inline-flex;
      gap: 8px;
      align-items: center;
      font-weight: 600;
      cursor: pointer;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: center;
      margin-top: 18px;
    }
    .start {
      border: 1px solid color-mix(in srgb, var(--accent) 64%, var(--line));
      border-radius: 14px;
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 94%, #fff), color-mix(in srgb, var(--accent) 82%, #0a54d9));
      color: #fff;
      padding: 14px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      min-width: 180px;
      box-shadow: 0 14px 30px color-mix(in srgb, var(--accent) 35%, transparent), inset 0 1px 0 rgba(255,255,255,.35);
      transition: transform .18s ease, filter .18s ease;
    }
    .start:hover {
      transform: translateY(-1px);
      filter: saturate(1.08);
    }
    .start:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    .hint {
      font-size: .92rem;
      color: var(--muted);
    }
    .settings-dialog {
      margin: auto;
      width: min(420px, calc(100vw - 24px));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: color-mix(in srgb, var(--bg-top) 92%, #ffffff);
      box-shadow: var(--shadow);
      color: inherit;
    }
    .settings-dialog::backdrop {
      background: rgba(6, 10, 20, .38);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .settings-title {
      margin: 0 0 10px;
      font-size: 1rem;
      font-weight: 700;
    }
    .settings-row {
      margin: 0 0 14px;
      color: var(--muted);
    }
    .result-dialog {
      width: min(460px, calc(100vw - 24px));
    }
    .result-message {
      margin: 0 0 14px;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
    }
    .result-dialog[data-tone="ok"] .result-message { color: var(--ok); }
    .result-dialog[data-tone="warn"] .result-message { color: var(--warn); }
    .result-dialog[data-tone="error"] .result-message { color: var(--error); }
    .busy-dialog {
      width: min(360px, calc(100vw - 24px));
    }
    .busy-message {
      margin: 0;
      color: var(--muted);
    }
    .theme-choice {
      margin: 0 0 14px;
      display: flex;
      gap: 12px;
      align-items: center;
      color: inherit;
    }
    .theme-choice label {
      margin: 0;
      display: inline-flex;
      gap: 6px;
      align-items: center;
      font-weight: 600;
      cursor: pointer;
    }
    .update-actions {
      display: flex;
      gap: 8px;
    }
    .btn-small {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px 12px;
      background: color-mix(in srgb, var(--glass) 88%, transparent);
      color: inherit;
      font: inherit;
      cursor: pointer;
      box-shadow: var(--inner);
    }
    .btn-small.primary {
      border-color: color-mix(in srgb, var(--accent) 70%, var(--line));
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 93%, #fff), color-mix(in srgb, var(--accent) 80%, #0a54d9));
      color: #fff;
      font-weight: 700;
    }
    button:focus-visible,
    input:focus-visible,
    .drop:focus-visible {
      outline: 2px solid color-mix(in srgb, var(--accent) 80%, #fff);
      outline-offset: 2px;
    }
    .footer-note {
      margin-top: 14px;
      font-size: .88rem;
      color: var(--muted);
    }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .hidden { display: none !important; }

    @media (max-width: 640px) {
      .app {
        padding: 10px;
      }
      .card {
        border-radius: 18px;
        padding: 14px;
      }
      h1 {
        font-size: 1.5rem;
      }
      .drop {
        min-height: 170px;
        padding: 14px;
      }
      .drop strong {
        font-size: 1.05rem;
      }
      .field {
        padding: 12px;
      }
      .pages {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }
      .pages button {
        width: 100%;
        min-width: 0;
        padding: 10px;
        border-radius: 12px;
      }
      .pages button.special-toggle {
        padding: 10px;
      }
      .mini-sheet,
      .special-icon {
        width: 72px;
        height: 72px;
      }
      .special-icon {
        gap: 5px;
      }
      .mini-sheet span,
      .special-sheet span {
        font-size: .84rem;
      }
      #studentCount {
        width: 100%;
        max-width: 100%;
      }
      .theme-choice {
        flex-wrap: wrap;
      }
      .start {
        width: 100%;
        min-width: 0;
      }
      .settings-dialog,
      .result-dialog,
      .busy-dialog {
        width: min(100vw - 16px, 460px);
      }
    }

    @media (max-width: 420px) {
      .pages {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .mini-sheet,
      .special-icon {
        width: 68px;
        height: 68px;
      }
      .special-sheet span,
      .mini-sheet span {
        font-size: .8rem;
      }
      .settings-trigger {
        width: 34px;
        height: 34px;
        border-radius: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="card">
      <div class="card-head">
        <h1>Merger</h1>
        <button id="settingsButton" class="settings-trigger" type="button" aria-label="Einstellungen öffnen">⚙️</button>
      </div>
      <div id="dropZone" class="drop" tabindex="0" role="button" aria-label="PDF auswählen">
        <div class="drop-content">
          <div id="dropHint">
            <strong>PDF hierhin ziehen</strong>
            <div>oder klicken zum Auswählen</div>
          </div>
          <div id="fileName" class="filename"></div>
        </div>
      </div>
    </section>

    <div class="cards-layout">
      <section class="card">
        <div class="card-head">
          <h2 class="card-title">Seiten zusammenführen</h2>
        </div>
        <div class="grid">
          <section id="optionsPanel" class="field options-disabled" aria-disabled="true">
            <h2 class="section-title">Seiten pro Blatt</h2>
